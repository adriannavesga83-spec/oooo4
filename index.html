<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFB COMPANY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:#05070a;
    overflow-x:hidden;
    position:relative;
}

/* GLOW AZUL AGUA MARINA */
body::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:#00ffd5;
    filter:blur(180px);
    opacity:.20;
    top:-150px;
    left:-150px;
}

body::after{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:#00bfa6;
    filter:blur(180px);
    opacity:.15;
    bottom:-150px;
    right:-150px;
}

.container{
    position:relative;
    z-index:10;
    width:100%;
    max-width:500px;
    text-align:center;
    padding:35px 25px;
    border-radius:25px;
    background:rgba(10,15,18,.92);
    border:1px solid rgba(0,255,213,.25);
    backdrop-filter:blur(15px);

    box-shadow:
    0 0 20px rgba(0,255,213,.15),
    0 0 40px rgba(0,255,213,.10),
    inset 0 0 20px rgba(0,255,213,.05);

    animation:fadeIn 1s ease;
}

.logo{
    width:170px;
    max-width:100%;
    margin-bottom:20px;
}

h1{
    color:#ffffff;
    font-size:2.3rem;
    font-weight:800;
    margin-bottom:20px;
    letter-spacing:0.5px;
}

p{
    color:#ffffff;
    font-size:1.15rem;
    font-weight:500;
    line-height:1.8;
    margin-bottom:30px;
    letter-spacing:0.2px;
}

.telegram-btn{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    padding:18px;
    border-radius:15px;

    text-decoration:none;
    color:white;
    font-size:1rem;
    font-weight:800;

    background:linear-gradient(90deg,#00ffd5,#00bfa6);

    box-shadow:
    0 10px 30px rgba(0,255,213,.25);

    transition:.3s;
}

.telegram-btn:hover{
    transform:scale(1.03);
    box-shadow:
    0 15px 45px rgba(0,255,213,.35);
}

.telegram-btn svg{
    width:22px;
    height:22px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:480px){

    .container{
        padding:30px 20px;
    }

    .logo{
        width:140px;
    }

    h1{
        font-size:1.9rem;
    }

    p{
        font-size:1.05rem;
        line-height:1.7;
    }

    .telegram-btn{
        font-size:.95rem;
        padding:16px;
    }
}

</style>
</head>
<body>

<div class="container">

    <img src="https://i.ibb.co/QFJX7WMn/photo-2025-01-12-09-29-37-2.jpg" alt="ANTRAX" class="logo">

    <h1>SFB COMPANY</h1>

    <p>
        TE ENSEÑO A GANAR 2 PALITOS DIARIOS 💸

        <br><br>

        Unete a mi grupo de TELEGRAM con el boton de abajo
        Ahi puedes ver toda la informacion. 💸
        
        <br><br>
        
        👇 UNETE AL GRUPO 👇
    </p>

    <a href="https://t.me/+NT7thOvJdg43ZjZh" target="_blank" class="telegram-btn">

        <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M21.5 2.5L2.8 9.7c-1.3.5-1.3 1.3-.2 1.6l4.8 1.5 1.8 5.7c.2.6.1.8.8.8.5 0 .7-.2 1-.5l2.3-2.2 4.8 3.5c.9.5 1.5.2 1.7-.8l3.2-15.1c.3-1.2-.4-1.8-1.5-1.3z"/>
        </svg>

        👉 UNIRME AL GRUPO 👈 

    </a>

</div>

</body>
</html>
